spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - '*'
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls-primary-name: API Gateway
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Banking Core Service
        url: /v3/api-docs/core
      - name: Notification Service
        url: /v3/api-docs/notification
app:
  gateway:
    routes:
      banking-core-uri: http://localhost:8081
      notification-service-uri: http://localhost:8082

server:
  port: 8080

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,gateway
